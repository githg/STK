<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Count PWA</title>
    
    <!-- PWA Requirements -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./icon-192.png">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./style.css">
    
    <!-- LocalForage (Lightweight wrapper for IndexedDB) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans antialiased h-screen flex flex-col overflow-hidden select-none">

    <!-- VIEW A: Initialization -->
    <div id="view-init" class="flex-1 flex flex-col items-center justify-center p-6 bg-white z-50 absolute inset-0">
        <h1 class="text-3xl font-bold text-slate-800 mb-8 tracking-tight">Stock Counter</h1>
        
        <form id="init-form" class="w-full max-w-sm space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1">User Name</label>
                <input type="text" id="init-name" required autocomplete="off"
                    class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 transition-shadow">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1">Department</label>
                <input type="text" id="init-dept" required autocomplete="off"
                    class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 transition-shadow">
            </div>
            
            <button type="submit" 
                class="w-full py-4 mt-4 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold rounded-xl shadow-lg transition-transform transform active:scale-95">
                Start Session
            </button>
        </form>
    </div>

    <!-- VIEW B: Main App -->
    <div id="view-main" class="hidden flex-1 flex flex-col h-full relative">
        
        <!-- Header -->
        <header class="bg-slate-800 text-white p-4 shadow-md flex justify-between items-center z-10 shrink-0">
            <div class="flex flex-col">
                <span id="header-session" class="font-bold text-lg leading-tight truncate max-w-[150px] sm:max-w-[200px]">Session</span>
            </div>
            <div class="flex items-center space-x-2">
                <button id="btn-export" type="button" class="px-3 py-1.5 bg-green-600 text-white rounded-lg text-sm font-bold shadow active:bg-green-700 transition-colors">
                    Export
                </button>
                <button id="btn-sync" type="button" class="px-3 py-1.5 bg-blue-600 text-white rounded-lg text-sm font-bold shadow active:bg-blue-700 transition-colors flex items-center">
                    Sync <span id="sync-count" class="ml-1 bg-red-500 rounded-full px-1.5 py-0.5 text-xs">0</span>
                </button>
                <button id="btn-exit" type="button" class="px-3 py-1.5 bg-slate-600 text-white rounded-lg text-sm font-bold shadow active:bg-slate-700 transition-colors">
                    Exit
                </button>
            </div>
        </header>

        <!-- Input Form (Sticky Top) -->
        <div class="bg-white p-4 shadow-sm z-10 shrink-0">
            <form id="entry-form" class="flex space-x-2">
                <!-- Enter key flow: Number -> Name -> Qty -> Submit -->
                <div class="flex-1 min-w-0">
                    <input type="text" id="input-number" required placeholder="Number *" autocomplete="off"
                        class="w-full px-2 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-base sm:text-lg font-mono">
                </div>
                <div class="flex-1 min-w-0">
                    <input type="text" id="input-name" placeholder="Name" autocomplete="off"
                        class="w-full px-2 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-base sm:text-lg">
                </div>
                <div class="w-16 sm:w-20 shrink-0">
                    <input type="number" id="input-qty" required placeholder="Qty *" autocomplete="off"
                        class="w-full px-2 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-base sm:text-lg text-center font-bold">
                </div>
                <!-- Hidden submit button for mobile keyboard "Go" functionality -->
                <button type="submit" class="hidden">Submit</button>
            </form>
        </div>

        <!-- List View (Scrollable) -->
        <div class="flex-1 overflow-y-auto p-2 sm:p-4 bg-slate-100">
            <div id="item-list" class="space-y-3 pb-20">
                <!-- Items will be injected here via JS -->
            </div>
        </div>

        <!-- Notification Toast -->
        <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-lg transition-all duration-300 opacity-0 translate-y-10 pointer-events-none z-50">
            Message
        </div>

    </div>

    <script src="./app.js"></script>
</body>
</html>
