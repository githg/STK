<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Count PWA</title>
    
    <!-- PWA Requirements -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./icon-192.png">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./style.css">
    
    <!-- LocalForage (Lightweight wrapper for IndexedDB) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans antialiased h-screen flex flex-col overflow-hidden select-none">

    <!-- VIEW A: Initialization -->
    <div id="view-init" class="flex-1 overflow-y-auto bg-white z-50 absolute inset-0 p-4 sm:p-6">
        <div class="min-h-full flex flex-col items-center justify-center py-8">
            <h1 class="text-3xl font-bold text-slate-800 mb-8 tracking-tight text-center">Stock Counter</h1>
        
        <form id="init-form" class="w-full max-w-sm space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1">User Name</label>
                <input type="text" id="init-name" name="init_n_field" required autocomplete="none" autocorrect="off" spellcheck="false" autocapitalize="off" data-lpignore="true" data-form-type="other"
                    class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 transition-shadow">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1">Department</label>
                <input type="text" id="init-dept" name="init_d_field" required autocomplete="none" autocorrect="off" spellcheck="false" autocapitalize="off" data-lpignore="true" data-form-type="other"
                    class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 transition-shadow">
            </div>
            
            <label class="flex items-center space-x-3 mt-4 p-3 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-100 transition-colors">
                <input type="checkbox" id="init-rolls" class="w-5 h-5 text-blue-600 rounded border-slate-300 focus:ring-blue-500">
                <span class="text-slate-700 font-semibold">Enable THAAN Counter</span>
            </label>

            <button type="submit" 
                class="w-full py-4 mt-4 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold rounded-xl shadow-lg transition-transform transform active:scale-95">
                Start Session
            </button>
        </form>

        <!-- Recent Sessions -->
        <div id="recent-sessions-container" class="w-full max-w-sm mt-8 hidden">
            <h3 class="text-sm font-semibold text-slate-500 mb-3 uppercase tracking-wider">Recent Sessions</h3>
            <div id="recent-sessions-list" class="space-y-2">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- PWA Install Prompt -->
        <div id="install-container" class="w-full max-w-sm mt-8 hidden">
            <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 text-center">
                <p class="text-sm text-blue-800 mb-3 font-semibold">Get the Native App Experience</p>
                <button id="btn-install" class="w-full py-2 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold rounded-lg shadow transition-colors">
                    Install App
                </button>
            </div>
        </div>
        </div>
    </div>

    <!-- VIEW B: Main App -->
    <div id="view-main" class="hidden flex-1 flex flex-col h-full relative">
        
        <!-- Header -->
        <header class="bg-slate-800 text-white py-2 px-3 shadow-md flex justify-between items-center z-10 shrink-0">
            <div class="flex-1 min-w-0 pr-2">
                <span id="header-session" class="font-bold text-base leading-tight truncate block">Session</span>
            </div>
            <div class="flex items-center space-x-1 sm:space-x-2 shrink-0">
                <button id="btn-export" type="button" class="px-2 py-1 sm:px-3 sm:py-1.5 bg-green-600 text-white rounded-lg text-xs sm:text-sm font-bold shadow active:bg-green-700 transition-colors">
                    Export
                </button>
                <button id="btn-sync" type="button" class="px-2 py-1 sm:px-3 sm:py-1.5 bg-blue-600 text-white rounded-lg text-xs sm:text-sm font-bold shadow active:bg-blue-700 transition-colors flex items-center">
                    Sync <span id="sync-count" class="ml-1 bg-red-500 rounded-full px-1.5 py-0.5 text-[10px]">0</span>
                </button>
                <button id="btn-close" type="button" class="px-2 py-1 sm:px-3 sm:py-1.5 bg-slate-600 text-white rounded-lg text-xs sm:text-sm font-bold shadow active:bg-slate-700 transition-colors">
                    Close
                </button>
            </div>
        </header>

        <!-- Input Form (Sticky Top) -->
        <div class="bg-white p-2 sm:p-4 shadow-md z-20 shrink-0 relative">
            <form id="entry-form" class="flex space-x-1 sm:space-x-2">
                <!-- Enter key flow: Number -> Name -> Qty -> Submit -->
                <div class="flex-1 min-w-0">
                    <input type="text" id="input-number" name="stk_val_1" required placeholder="Code *" autocomplete="none" autocorrect="off" spellcheck="false" autocapitalize="off" data-lpignore="true" data-form-type="other"
                        class="w-full px-2 py-2 sm:px-3 sm:py-3 rounded-lg border border-slate-300 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 text-base sm:text-lg font-bold font-mono transition-all shadow-inner">
                </div>
                <div class="flex-1 min-w-0">
                    <input type="text" id="input-name" name="stk_val_2" placeholder="Brand Name" autocomplete="none" autocorrect="off" spellcheck="false" autocapitalize="off" data-lpignore="true" data-form-type="other"
                        class="w-full px-2 py-2 sm:px-3 sm:py-3 rounded-lg border border-slate-300 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 text-base sm:text-lg font-bold transition-all shadow-inner">
                </div>
                <div class="flex items-center justify-center shrink-0">
                    <button type="button" id="btn-lock" class="p-2 sm:p-3 bg-slate-50 hover:bg-slate-200 text-slate-400 rounded-lg border border-slate-200 transition-colors" title="Lock Code/Brand">
                        <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    </button>
                </div>
                <div id="rolls-container" class="w-14 sm:w-20 shrink-0 hidden">
                    <input type="number" id="input-rolls" name="stk_rolls" placeholder="Thaan" autocomplete="none" data-lpignore="true"
                        class="w-full px-1 py-2 sm:px-2 sm:py-3 rounded-lg border border-amber-300 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-500/20 text-base sm:text-lg text-center font-bold bg-amber-50 transition-all shadow-inner">
                </div>
                <div class="w-16 sm:w-24 shrink-0">
                    <input type="number" id="input-qty" name="stk_val_3" required placeholder="Qty *" autocomplete="none" data-lpignore="true"
                        class="w-full px-1 py-2 sm:px-2 sm:py-3 rounded-lg border border-blue-300 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 text-base sm:text-lg text-center font-bold bg-blue-50 transition-all shadow-inner">
                </div>
                <!-- Hidden submit button for mobile keyboard "Go" functionality -->
                <button type="submit" class="hidden">Submit</button>
            </form>

            <!-- Autocomplete Suggestions Dropdown -->
            <div id="autocomplete-dropdown" class="absolute left-4 right-4 top-[100%] mt-1 bg-slate-50 border-2 border-slate-200 shadow-2xl rounded-xl z-50 hidden max-h-56 overflow-y-auto divide-y divide-slate-200">
                <!-- Suggestions injected here -->
            </div>
        </div>

        <!-- List View (Scrollable) -->
        <div class="flex-1 overflow-y-auto p-2 sm:p-4 bg-slate-100">
            <div id="item-list" class="space-y-3 pb-20">
                <!-- Items will be injected here via JS -->
            </div>
        </div>

        <!-- Notification Toast -->
        <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-lg transition-all duration-300 opacity-0 translate-y-10 pointer-events-none z-50">
            Message
        </div>

    </div>

    <!-- Fullscreen Toggle -->
    <button id="btn-fullscreen" class="fixed bottom-4 right-4 bg-slate-800/80 text-white p-3 rounded-full shadow-lg z-50 hover:bg-slate-700 active:scale-95 transition-all backdrop-blur-sm" title="Toggle Fullscreen">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>
        </svg>
    </button>

    <script src="./app.js"></script>
</body>
</html>
